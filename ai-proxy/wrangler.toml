name = "abhijit-portfolio-ai"
main = "src/index.js"
compatibility_date = "2024-03-20"

[observability]
enabled = true

# Cloudflare Workers AI — Kriti's primary brain. Same account, same edge network
# as this Worker, so it's far more reliable than the third-party HuggingFace API
# (which was dropping calls with 502s). Free tier ~10,000 neurons/day (~650 chats).
[ai]
binding = "AI"

[[kv_namespaces]]
binding = "AI_PROXY_KV"
id = "1cdccde57c674561b0658b3c028588c1"

[vars]
# Where new-lead alert emails are delivered. Currently the Resend signup Gmail
# (free sandbox can only send to the account's own email until a domain is
# verified). Switch to growabhijit@gmail.com after verifying abhiijit.works.
LEAD_TO = "guitarguitarabhijit@gmail.com"
# You will need to set this via wrangler secret put HUGGINGFACE_API_KEY
# Do NOT commit your API key here.
# To view analytics: wrangler secret put STATS_KEY (pick any password), then visit
# https://abhijit-portfolio-ai.guitarguitarabhijit.workers.dev/stats?key=<that password>
